name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-provider: basic

      - name: Validate required release secrets
        env:
          ANDROID_AUTO_CERT_B64: ${{ secrets.ANDROID_AUTO_CERT_B64 }}
          ANDROID_AUTO_IDENTITY_B64: ${{ secrets.ANDROID_AUTO_IDENTITY_B64 }}
          MOTOHUB_KEYSTORE_B64: ${{ secrets.MOTOHUB_KEYSTORE_B64 }}
          MOTOHUB_KEYSTORE_PASSWORD: ${{ secrets.MOTOHUB_KEYSTORE_PASSWORD }}
          MOTOHUB_KEY_ALIAS: ${{ secrets.MOTOHUB_KEY_ALIAS }}
        run: |
          set -euo pipefail
          for name in \
            ANDROID_AUTO_CERT_B64 \
            ANDROID_AUTO_IDENTITY_B64 \
            MOTOHUB_KEYSTORE_B64 \
            MOTOHUB_KEYSTORE_PASSWORD \
            MOTOHUB_KEY_ALIAS; do
            if [[ -z "${!name:-}" ]]; then
              echo "Required GitHub Actions secret is missing: $name" >&2
              exit 1
            fi
          done

      - name: Provision Android Auto identity and signing key
        env:
          ANDROID_AUTO_CERT_B64: ${{ secrets.ANDROID_AUTO_CERT_B64 }}
          ANDROID_AUTO_IDENTITY_B64: ${{ secrets.ANDROID_AUTO_IDENTITY_B64 }}
          MOTOHUB_KEYSTORE_B64: ${{ secrets.MOTOHUB_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          identity_dir="tooling/private/android-auto"
          mkdir -p "$identity_dir" "$RUNNER_TEMP/motohub-release"
          printf '%s' "$ANDROID_AUTO_CERT_B64" | base64 --decode > "$identity_dir/aa_cert"
          printf '%s' "$ANDROID_AUTO_IDENTITY_B64" | base64 --decode > "$identity_dir/aa_identity_data"
          printf '%s' "$MOTOHUB_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/motohub-release/motohub-release.jks"

          test -s "$identity_dir/aa_cert"
          test -s "$identity_dir/aa_identity_data"
          test -s "$RUNNER_TEMP/motohub-release/motohub-release.jks"

          openssl x509 -in "$identity_dir/aa_cert" -pubkey -noout \
            | openssl pkey -pubin -outform DER \
            > "$RUNNER_TEMP/motohub-release/certificate-public-key.der"
          base64 --decode "$identity_dir/aa_identity_data" \
            > "$RUNNER_TEMP/motohub-release/android-auto-private-key.der"
          openssl pkey \
            -inform DER \
            -in "$RUNNER_TEMP/motohub-release/android-auto-private-key.der" \
            -pubout \
            -outform DER \
            > "$RUNNER_TEMP/motohub-release/private-public-key.der"
          cmp \
            "$RUNNER_TEMP/motohub-release/certificate-public-key.der" \
            "$RUNNER_TEMP/motohub-release/private-public-key.der"

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Test and build release APK
        working-directory: apps/android
        run: |
          set -euo pipefail
          ./gradlew \
            --no-daemon \
            clean \
            -PincludeAndroidAutoIdentity=true \
            testDebugUnitTest \
            lintRelease \
            assembleRelease

      - name: Sign and verify release APK
        id: package
        env:
          MOTOHUB_KEYSTORE_PASSWORD: ${{ secrets.MOTOHUB_KEYSTORE_PASSWORD }}
          MOTOHUB_KEY_ALIAS: ${{ secrets.MOTOHUB_KEY_ALIAS }}
        run: |
          set -euo pipefail
          build_tools="$ANDROID_HOME/build-tools/36.0.0"
          metadata="apps/android/app/build/outputs/apk/release/output-metadata.json"
          unsigned_apk="apps/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          aligned_apk="$RUNNER_TEMP/motohub-release/app-release-aligned.apk"
          resources_dump="$RUNNER_TEMP/motohub-release/resources.txt"
          badging_dump="$RUNNER_TEMP/motohub-release/badging.txt"
          version_name="$(jq -r '.elements[0].versionName' "$metadata")"
          version_code="$(jq -r '.elements[0].versionCode' "$metadata")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$version_name" != "$tag_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match versionName $version_name" >&2
            exit 1
          fi

          "$build_tools/aapt" dump resources "$unsigned_apk" > "$resources_dump"
          grep -q 'raw/aa_cert' "$resources_dump"
          grep -q 'raw/aa_identity_data' "$resources_dump"

          release_dir="$RUNNER_TEMP/motohub-release/assets"
          mkdir -p "$release_dir"
          apk_name="MOTO-HUB-${version_name}-${version_code}-android-auto.apk"
          apk_path="$release_dir/$apk_name"

          "$build_tools/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$RUNNER_TEMP/motohub-release/motohub-release.jks" \
            --ks-key-alias "$MOTOHUB_KEY_ALIAS" \
            --ks-pass env:MOTOHUB_KEYSTORE_PASSWORD \
            --key-pass env:MOTOHUB_KEYSTORE_PASSWORD \
            --out "$apk_path" \
            "$aligned_apk"

          "$build_tools/zipalign" -c -v 4 "$apk_path"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk_path"
          "$build_tools/aapt" dump badging "$apk_path" > "$badging_dump"
          grep -q "versionCode='$version_code'" "$badging_dump"
          grep -q "versionName='$version_name'" "$badging_dump"

          checksum_path="$apk_path.sha256"
          sha256sum "$apk_path" > "$checksum_path"
          {
            echo "apk_path=$apk_path"
            echo "checksum_path=$checksum_path"
            echo "apk_name=$apk_name"
          } >> "$GITHUB_OUTPUT"

      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ steps.package.outputs.apk_name }}
          path: |
            ${{ steps.package.outputs.apk_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.package.outputs.apk_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "$APK_PATH" \
            "$CHECKSUM_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --title "MOTO-HUB $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

      - name: Remove provisioned private material
        if: always()
        run: |
          rm -rf tooling/private/android-auto
          rm -rf "$RUNNER_TEMP/motohub-release"
